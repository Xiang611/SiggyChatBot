<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Siggy | Ritual</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07080f;
      --surface: #0d0f1c;
      --card: #11142a;
      --border: #1e2240;
      --accent: #4fffc4;
      --accent2: #7b6fff;
      --text: #e8eaf6;
      --muted: #5a5f80;
      --user-bg: #1a1d3a;
      --radius: 18px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(79,255,196,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -150px; right: -100px;
      width: 500px; height: 400px;
      background: radial-gradient(ellipse, rgba(123,111,255,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      padding: 20px 28px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(13,15,28,0.9);
      backdrop-filter: blur(12px);
      position: relative;
    }

    .avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .avatar-wrap img {
      width: 52px; height: 52px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--accent);
      box-shadow: 0 0 16px rgba(79,255,196,0.35);
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-4px); }
    }

    .status-dot {
      position: absolute;
      bottom: 2px; right: 2px;
      width: 11px; height: 11px;
      background: var(--accent);
      border-radius: 50%;
      border: 2px solid var(--bg);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .header-info h1 {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-info p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 1px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .header-badge {
      margin-left: auto;
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent2);
      background: rgba(123,111,255,0.12);
      border: 1px solid rgba(123,111,255,0.3);
      padding: 5px 10px;
      border-radius: 20px;
    }

    #reset-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 10px;
      padding: 7px 13px;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    #reset-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      animation: slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 1.5px solid var(--accent);
      box-shadow: 0 0 8px rgba(79,255,196,0.2);
    }

    .msg-avatar.user-av {
      background: var(--accent2);
      border-color: var(--accent2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      font-family: 'Syne', sans-serif;
    }

    .msg-bubble {
      max-width: 72%;
      padding: 13px 17px;
      border-radius: 18px;
      font-size: 14.5px;
      line-height: 1.65;
    }

    .msg-row.bot .msg-bubble {
      background: var(--card);
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
      color: var(--text);
    }

    .msg-row.user .msg-bubble {
      background: linear-gradient(135deg, #1e2a5e, #1a1d3a);
      border: 1px solid rgba(123,111,255,0.3);
      border-bottom-right-radius: 5px;
      color: #c8caff;
    }

    /* Typing indicator */
    .typing-row .msg-bubble {
      padding: 14px 18px;
    }

    .typing-dots {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.3s infinite;
      opacity: 0.6;
    }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* Welcome message */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .welcome img {
      width: 88px; height: 88px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      box-shadow: 0 0 30px rgba(79,255,196,0.3);
      margin-bottom: 16px;
    }

    .welcome h2 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .welcome p {
      font-size: 14px;
      color: var(--muted);
      max-width: 320px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* Input */
    .input-area {
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
      background: rgba(13,15,28,0.95);
      backdrop-filter: blur(12px);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      padding: 12px 16px;
      resize: none;
      outline: none;
      min-height: 46px;
      max-height: 140px;
      line-height: 1.5;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,255,196,0.08);
    }
    textarea::placeholder { color: var(--muted); }

    #send-btn {
      width: 46px; height: 46px;
      background: linear-gradient(135deg, var(--accent), #2ee8a8);
      border: none;
      border-radius: 14px;
      color: #07080f;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, opacity 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(79,255,196,0.3);
    }
    #send-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(79,255,196,0.4); }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

    #send-btn svg { width: 20px; height: 20px; }
  </style>
</head>

    } else {
      const av = document.createElement("div");
      av.className = "msg-avatar user-av";
      av.textContent = "U";
      row.appendChild(av);
    }

    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.textContent = text;
    row.appendChild(bubble);

    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }

  function addTyping() {
    welcome && (welcome.style.display = 'none');
    const row = document.createElement("div");
    row.className = "msg-row bot typing-row";
    row.id = "typing";

    const av = document.createElement("img");
    av.className = "msg-avatar";
    av.src = SIGGY_SRC;
    row.appendChild(av);

    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.innerHTML = '<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    row.appendChild(bubble);

    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    document.getElementById("typing")?.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;

    addMessage(text, "user");
    addTyping();

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, session_id: sessionId })
      });
      const data = await res.json();
      removeTyping();
      addMessage(data.reply || data.error, "bot");
    } catch (e) {
      removeTyping();
      addMessage("...even I can't help you right now. Server's being dramatic. 🐾", "bot");
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  sendBtn.addEventListener("click", sendMessage);

  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
  });

  resetBtn.addEventListener("click", async () => {
    await fetch("/reset", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: sessionId })
    });
    messagesEl.innerHTML = '';
    const w = document.createElement('div');
    w.className = 'welcome';
    w.id = 'welcome';
    w.innerHTML = `<img src="${SIGGY_SRC}" alt="Siggy"><h2>Oh, it's you again.</h2><p>Back already? How unsurprising. Fine, ask away. 😒</p>`;
    messagesEl.appendChild(w);
  });
</script>
</body>
</html>
